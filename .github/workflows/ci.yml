name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: zig fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - run: zig fmt --check src/ build.zig

  test-linux:
    name: zig build test (linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - run: zig build test

  test-linux-arm64:
    name: zig build test (linux arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - run: zig build test

  test-macos:
    name: zig build test (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - run: zig build test
